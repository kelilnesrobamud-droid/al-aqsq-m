<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>አል አቅሷ መድረሳ - Admin Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 5px; }
        .container { width: 100%; max-width: 550px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; box-sizing: border-box; }
        h1 { color: #1a5d1a; text-align: center; font-size: 20px; border-bottom: 3px solid #27ae60; padding-bottom: 10px; margin-bottom: 10px; }
        
        .month-select-box { width: 100%; padding: 10px; margin-bottom: 10px; border: 2px solid #27ae60; border-radius: 6px; font-weight: bold; font-size: 15px; background: #e8f5e9; color: #1a5d1a; outline: none; }
        .section { margin-bottom: 25px; border: 1px solid #eee; border-radius: 8px; padding: 10px; background: #fff; }
        h2 { color: #1a5d1a; font-size: 15px; margin: 0 0 10px 0; background: #f9f9f9; padding: 8px; border-radius: 4px; border-left: 5px solid #27ae60; }
        
        .toggle-btn { background: #27ae60; color: white; border: none; padding: 10px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 13px; }
        .registration-area { display: none; background: #fafafa; padding: 15px; border: 1px dashed #27ae60; border-radius: 8px; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #eee; padding: 8px 2px; text-align: center; font-size: 11px; }
        th { background-color: #f8f9fa; color: #1a5d1a; }
        .col-name { width: 40%; text-align: left; padding-left: 5px; font-weight: bold; }

        /* አድሚን ሞዳል */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 400px; border-radius: 15px; text-align: center; position: relative; }
        .chat-box { height: 200px; border: 1px solid #ddd; overflow-y: scroll; margin-bottom: 10px; text-align: left; padding: 10px; font-size: 13px; background: #f9f9f9; border-radius: 8px; }
        .msg-item { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        .del-msg { color: #e74c3c; cursor: pointer; font-weight: bold; font-size: 14px; margin-left: 10px; }
        
        .modal-btn { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-send { background: #1a5d1a; }
        .btn-clear { background: #555; }
        .btn-orange { background: #f39c12; }
        .btn-red { background: #e74c3c; }

        .footer { margin-top: 20px; text-align: center; }
        .admin-box { display: inline-block; background: #455a64; color: white; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h1>አል አቅሷ መድረሳ</h1>

    <div class="section">
        <h2>1ኛ ክፍል (ፈትሂያ)</h2>
        <select id="month1" class="month-select-box" onchange="changeMonth(1)">
            <option value="መስከረም">መስከረም</option><option value="ጥቅምት">ጥቅምት</option><option value="ህዳር">ህዳር</option>
            <option value="ታህሳስ">ታህሳስ</option><option value="ጥር">ጥር</option><option value="የካቲት">የካቲት</option>
            <option value="መጋቢት">መጋቢት</option><option value="ሚያዝያ">ሚያዝያ</option><option value="ግንቦት">ግንቦት</option>
            <option value="ሰኔ">ሰኔ</option><option value="ሐምሌ">ሐምሌ</option><option value="ነሐሴ">ነሐሴ</option>
        </select>
        <button class="toggle-btn" onclick="toggleForm(1)">+ ተማሪ መዝግብ</button>
        <div id="form1" class="registration-area">
            <input type="text" id="name1" placeholder="ስም">
            <input type="number" id="paid1" placeholder="ክፍያ">
            <input type="number" id="rem1" placeholder="ቀሪ">
            <button class="modal-btn btn-send" onclick="saveNewStudent(1)">ሴቭ</button>
        </div>
        <tbody id="tbody1"></tbody>
        <table>
            <thead><tr><th>ተ.ቁ</th><th class="col-name">ስም</th><th>ክፍያ</th><th>ቀሪ</th><th>⚙️</th></tr></thead>
            <tbody id="tbody1"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>2ኛ ክፍል (ኸሊል)</h2>
        <select id="month2" class="month-select-box" onchange="changeMonth(2)">
            <option value="መስከረም">መስከረም</option><option value="ጥቅምት">ጥቅምት</option><option value="ህዳር">ህዳር</option>
            <option value="ታህሳስ">ታህሳስ</option><option value="ጥር">ጥር</option><option value="የካቲት">የካቲት</option>
            <option value="መጋቢት">መጋቢት</option><option value="ሚያዝያ">ሚያዝያ</option><option value="ግንቦት">ግንቦት</option>
            <option value="ሰኔ">ሰኔ</option><option value="ሐምሌ">ሐምሌ</option><option value="ነሐሴ">ነሐሴ</option>
        </select>
        <button class="toggle-btn" onclick="toggleForm(2)">+ ተማሪ መዝግብ</button>
        <div id="form2" class="registration-area">
            <input type="text" id="name2" placeholder="ስም">
            <input type="number" id="paid2" placeholder="ክፍያ">
            <input type="number" id="rem2" placeholder="ቀሪ">
            <button class="modal-btn btn-send" onclick="saveNewStudent(2)">ሴቭ</button>
        </div>
        <table>
            <thead><tr><th>ተ.ቁ</th><th class="col-name">ስም</th><th>ክፍያ</th><th>ቀሪ</th><th>⚙️</th></tr></thead>
            <tbody id="tbody2"></tbody>
        </table>
    </div>

    <div class="footer">
        <div class="admin-box" onclick="openAdmin()">አድሚን ክፍል</div>
    </div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h3>አድሚን መቆጣጠሪያ</h3>
        <div class="chat-box" id="msgHistory"></div>
        <input type="text" id="adminMsg" placeholder="መልእክት ይጻፉ...">
        <button class="modal-btn btn-send" onclick="sendMsg()">ላክ</button>
        <button class="modal-btn btn-clear" onclick="clearAllMsgs()">ሁሉንም መልእክት አጥፋ</button>
        <hr>
        <input type="text" id="newPin" placeholder="አዲስ ፒን">
        <button class="modal-btn btn-orange" onclick="changePin()">ፒን ቀይር</button>
        <button class="modal-btn btn-red" onclick="closeAdmin()">ዝጋ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCR0jFmZZRh-YELRFeWFzLzZDe7VXiyge4",
        authDomain: "kelil-nesro-shop-2d67b.firebaseapp.com",
        databaseURL: "https://kelil-nesro-shop-2d67b-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "kelil-nesro-shop-2d67b",
        storageBucket: "kelil-nesro-shop-2d67b.firebasestorage.app",
        messagingSenderId: "624822189907",
        appId: "1:624822189907:web:dabb9828e6fe2c64406ba6"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentPin = "0000";
    const monthsArr = ["መስከረም", "ጥቅምት", "ህዳር", "ታህሳስ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ"];

    function openAdmin() {
        let p = prompt("ፒን ያስገቡ:");
        if (p === currentPin) {
            document.getElementById('adminModal').style.display = 'block';
            loadMessages();
        } else {
            alert("የተሳሳተ ፒን!");
        }
    }

    function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }

    function sendMsg() {
        let m = document.getElementById('adminMsg').value;
        if (!m) return;
        let time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
        db.ref('al_aqsa_madrasa/chat').push({ msg: m, time: time });
        document.getElementById('adminMsg').value = "";
    }

    function loadMessages() {
        db.ref('al_aqsa_madrasa/chat').on('value', snap => {
            let h = "";
            snap.forEach(c => {
                let d = c.val();
                h += `<div class="msg-item">
                        <span><b>${d.time}:</b> ${d.msg}</span>
                        <span class="del-msg" onclick="deleteSingleMsg('${c.key}')">❌</span>
                      </div>`;
            });
            document.getElementById('msgHistory').innerHTML = h || "መልእክት የለም";
            let b = document.getElementById('msgHistory');
            b.scrollTop = b.scrollHeight;
        });
    }

    function deleteSingleMsg(key) {
        if(confirm("ይህ መልእክት ይጥፋ?")) {
            db.ref(`al_aqsa_madrasa/chat/${key}`).remove();
        }
    }

    function clearAllMsgs() {
        if(confirm("ሁሉንም መልእክቶች ማጥፋት ትፈልጋለህ?")) {
            db.ref('al_aqsa_madrasa/chat').remove();
        }
    }

    function changePin() {
        let np = document.getElementById('newPin').value;
        if (np.length >= 4) {
            db.ref('al_aqsa_madrasa/settings/pin').set(np).then(() => alert("ፒን ተቀይሯል!"));
        } else {
            alert("ፒን ቢያንስ 4 አሃዝ መሆን አለበት");
        }
    }

    function changeMonth(g) { listenToData(document.getElementById(`month${g}`).value, g); }

    function saveNewStudent(g) {
        let n = document.getElementById(`name${g}`).value;
        let p = parseFloat(document.getElementById(`paid${g}`).value) || 0;
        let r = parseFloat(document.getElementById(`rem${g}`).value) || 0;
        let m = document.getElementById(`month${g}`).value;
        if(!n) return alert("ስም ያስገቡ");
        let key = db.ref().child('students').push().key;
        let u = {};
        monthsArr.forEach(mo => { u[`al_aqsa_madrasa/${mo}/grade${g}/${key}`] = {name:n, paid:(mo===m?p:0), rem:(mo===m?r:0)}; });
        db.ref().update(u).then(() => {
            document.getElementById(`name${g}`).value = "";
            document.getElementById(`paid${g}`).value = "";
            document.getElementById(`rem${g}`).value = "";
            toggleForm(g);
        });
    }

    function listenToData(m, g) {
        db.ref(`al_aqsa_madrasa/${m}/grade${g}`).on('value', snap => {
            let b = document.getElementById(`tbody${g}`);
            b.innerHTML = "";
            let i = 0;
            snap.forEach(c => {
                i++; let d = c.val();
                b.innerHTML += `<tr><td>${i}</td><td class="col-name">${d.name}</td><td>${d.paid}</td><td>${d.rem}</td>
                <td><button onclick="updateRec('${m}',${g},'${c.key}',${d.paid},${d.rem})">⚙️</button></td></tr>`;
            });
            for(let k=i+1; k<=30; k++) b.innerHTML += `<tr><td>${k}</td><td>-</td><td>-</td><td>-</td><td>-</td></tr>`;
        });
    }

    function updateRec(m,g,k,p,r) {
        let c = prompt("1. ክፍያ ጨምር\n2. ተማሪ ሰርዝ");
        let ref = db.ref(`al_aqsa_madrasa/${m}/grade${g}/${k}`);
        if(c==="1") {
            let a = parseFloat(prompt("መጠን?"));
            if(!isNaN(a)) ref.update({paid: p+a, rem: Math.max(0, r-a)});
        } else if(c==="2") {
            if(confirm("ተማሪው ከሁሉም ወራት ይጥፋ?")) {
                let u = {}; monthsArr.forEach(mo => u[`al_aqsa_madrasa/${mo}/grade${g}/${k}`] = null);
                db.ref().update(u);
            }
        }
    }

    function toggleForm(g) {
        let f = document.getElementById(`form${g}`);
        f.style.display = (f.style.display === "block") ? "none" : "block";
    }

    window.onload = () => {
        db.ref('al_aqsa_madrasa/settings/pin').on('value', snap => { if(snap.val()) currentPin = snap.val(); });
        changeMonth(1); changeMonth(2);
    };
</script>
</body>
</html>
